name: Postman API Tests

on:
  push:
    branches: [main]
    paths:
      - 'backend/**'
      - 'tests/postman/**'
  pull_request:
    branches: [main]
    paths:
      - 'backend/**'
      - 'tests/postman/**'
  workflow_dispatch:

jobs:
  api-tests:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: hermes
          POSTGRES_PASSWORD: hermes_secret
          POSTGRES_DB: hermes_todolist
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U hermes"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-go@v5
        with:
          go-version: '1.23'
          cache-dependency-path: backend/go.sum

      - name: Build backend
        working-directory: ./backend
        run: go build -o /tmp/hermes-server ./cmd/server/...
        env:
          CGO_ENABLED: 0

      - name: Wait for Postgres
        run: |
          for i in $(seq 1 30); do
            pg_isready -h localhost -U hermes -d hermes_todolist && break
            sleep 1
          done

      - name: Run migrations
        run: |
          for f in backend/internal/infra/postgres/migrations/*.up.sql; do
            PGPASSWORD=hermes_secret psql -h localhost -U hermes -d hermes_todolist -f "$f"
          done
        env:
          PGPASSWORD: hermes_secret

      - name: Start server
        run: |
          /tmp/hermes-server &
          for i in $(seq 1 30); do
            curl -s -o /dev/null http://localhost:8080/api/v1/health && break
            sleep 1
          done
        env:
          DATABASE_URL: "postgres://hermes:hermes_secret@localhost:5432/hermes_todolist?sslmode=disable"
          JWT_SECRET: ci-test-secret
          JWT_EXPIRY_HOURS: 168h
          SERVER_PORT: 8080
          LOG_LEVEL: error
          CORS_ORIGIN: http://localhost:3000

      - name: Verify server
        run: curl -s http://localhost:8080/api/v1/health

      - name: Install Newman
        run: npm install -g newman

      - name: Run Postman tests
        run: |
          newman run tests/postman/collection.json \
            --env-var "base_url=http://localhost:8080/api/v1" \
            --reporters cli,junit \
            --reporter-junit-export results/newman-report.xml \
            --delay-request 100

      - name: Upload report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: newman-report
          path: results/newman-report.xml
