version: "2"
sql:
  - engine: "postgresql"
    queries: "internal/infra/postgres/sql/"
    schema: "internal/infra/postgres/migrations/"
    gen:
      go:
        package: "queries"
        out: "internal/infra/postgres/queries"
        sql_package: "pgx/v5"
        emit_json_tags: true
        emit_prepared_queries: true
        emit_interface: true
        emit_pointers_for_null_types: true
        overrides:
          - db_type: "uuid"
            go_type:
              import: "github.com/google/uuid"
              type: "UUID"
          - db_type: "timestamptz"
            go_type: "time.Time"
          - db_type: "pg_catalog.timestamptz"
            go_type: "time.Time"
