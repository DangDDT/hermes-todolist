# Hot reload config for Go development
# Install: go install github.com/air-verse/air@latest
# Usage: air

root = "."
testdata_dir = "testdata"
tmp_dir = "tmp"

[build]
  cmd = "go build -o ./tmp/server ./cmd/server"
  bin = "./tmp/server"
  full_bin = "APP_ENV=development ./tmp/server"
  include_ext = ["go", "tpl", "tmpl", "html", "sql"]
  exclude_dir = ["tmp", "vendor", "testdata"]
  include_file = []
  exclude_file = []
  log = "build-errors.log"
  delay = 1000
  stop_on_error = true
  send_interrupt = true
  kill_delay = 500

[color]
  main = "magenta"
  watcher = "cyan"
  build = "yellow"
  runner = "green"

[misc]
  clean_on_exit = true
