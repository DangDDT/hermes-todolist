version: "3.9"

# ============================================
# Development overrides
# Usage: docker compose -f docker-compose.yml -f docker-compose.override.yml up
# ============================================

services:
  nginx:
    ports:
      - "80:80"

  api:
    build:
      target: development
    volumes:
      - ./backend:/app
      - go_mod_cache:/go/pkg/mod
    environment:
      - LOG_LEVEL=debug
      - CORS_ORIGIN=http://localhost:3000
    ports:
      - "8080:8080"

  postgres:
    ports:
      - "5432:5432"

  # Next.js dev server with HMR
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: development
    container_name: hermes-frontend-dev
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8080/api/v1
    depends_on:
      api:
        condition: service_healthy
    networks:
      - hermes-network

volumes:
  go_mod_cache:
